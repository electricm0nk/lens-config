architecture_context:
  target_repo: terminus.infra
  summary: >
    Bootstraps and standardizes Vault KV v2 + Consul + SOPS/age as a reusable
    secret management capability for all terminus-infra and terminus-platform initiatives.
  toolchain:
    provisioning: opentofu-1.11.0
    secrets_authoring: sops+age
    secrets_runtime: vault-kv-v2-1.21.4
    state_backend: consul-1.22.5
  decisions_from_proxmox:
    - SOPS+age is the Git-native secret authoring format; Vault KV v2 is the runtime delivery target
    - Vault path convention: secret/terminus/{env}/{capability}/...
    - Per-environment machine identities; no shared platform-wide automation identity
    - Bootstrap order: remote state → infra provisioned → secrets published → Ansible runs
    - Secret publication is an explicit idempotent workflow step, not ad hoc
  notes:
    - Foundation initiative — all other infra and platform capabilities depend on this
    - Defines age key custody and distribution rules
    - feature track selected because this requires a businessplan PRD phase
    - Should be planned and executed before terminus-infra-k3s, postgres, crossplane
