stories:
  - id: k3s-ops-1
    title: Create kubectl symlink on all k3s nodes
    status: done
    created: 2026-03-28T00:00:00Z
    description: >
      k3s ships the kubectl binary as part of the k3s binary (via multi-call dispatch),
      but /usr/local/bin/kubectl symlink was not created on any node. Without it, users
      and scripts expecting a standalone `kubectl` command fail. This story creates the
      symlink on all control-plane and worker nodes so that `kubectl` works natively.
    acceptance_criteria:
      - /usr/local/bin/kubectl symlink exists on all k3s nodes
      - kubectl version returns successfully on all nodes
    playbook: platforms/k3s/ansible/playbooks/maintain-nodes.yml
    tags: [kubectl, symlink, ops, maintenance]
